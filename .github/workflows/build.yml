name: Build Nextube Firmware

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v5.5.3
    outputs:
      fw_version: ${{ steps.version.outputs.fw_version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract firmware version
        id: version
        run: |
          FW_VER=$(python3 -c "import json; print(json.load(open('version.json'))['version'])")
          echo "fw_version=$FW_VER" >> $GITHUB_OUTPUT
          echo "Firmware version: $FW_VER"

      - name: Build firmware
        shell: bash
        run: |
          . $IDF_PATH/export.sh
          idf.py build
          echo "Build complete"

      - name: Prepare artifacts
        run: |
          FW_VER=${{ steps.version.outputs.fw_version }}
          mkdir -p artifacts
          cp build/nextube-fw.bin           artifacts/nextube-fw-v${FW_VER}-ota.bin
          cp build/bootloader/bootloader.bin artifacts/
          cp build/partition_table/partition-table.bin artifacts/
          cp build/spiffs.bin               artifacts/
          # Create combined flashable image (USB full-flash only, NOT for OTA)
          . $IDF_PATH/export.sh
          esptool.py --chip esp32 merge_bin \
            -o artifacts/nextube-fw-v${FW_VER}-full.bin \
            --flash_mode dio \
            --flash_freq 40m \
            --flash_size 16MB \
            0x1000  build/bootloader/bootloader.bin \
            0x8000  build/partition_table/partition-table.bin \
            0x10000 build/nextube-fw.bin \
            0x910000 build/spiffs.bin

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nextube-firmware
          path: artifacts/

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: nextube-firmware
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: Nextube-Remaster v${{ needs.build.outputs.fw_version }}
          files: |
            artifacts/nextube-fw-v${{ needs.build.outputs.fw_version }}-ota.bin
            artifacts/nextube-fw-v${{ needs.build.outputs.fw_version }}-full.bin
            artifacts/bootloader.bin
            artifacts/partition-table.bin
            artifacts/spiffs.bin
          body: |
            ## Nextube Open-Source Firmware v${{ needs.build.outputs.fw_version }}

            ### Flash Instructions

            **OTA (over-the-air) — use this for updates on a running device:**
            Upload `nextube-fw-ota.bin` via the web UI at `http://nextube-remaster.local` → System → Firmware Update.

            **Full flash via USB — first-time or recovery flash:**
            ```bash
            esptool.py --chip esp32 --port /dev/ttyUSB0 --baud 921600 \
              write_flash 0x0 nextube-fw-full.bin
            ```

            **Individual partitions via USB:**
            ```bash
            esptool.py --chip esp32 --port /dev/ttyUSB0 --baud 921600 \
              --flash_mode dio --flash_freq 40m --flash_size 16MB \
              write_flash \
              0x1000   bootloader.bin \
              0x8000   partition-table.bin \
              0x10000  nextube-fw-ota.bin \
              0x910000 spiffs.bin
            ```
          draft: false
          prerelease: false
